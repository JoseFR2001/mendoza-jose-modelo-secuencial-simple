<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <title>Entrenamiento y = 2x + 6</title>
  </head>
  <body>
<body>
    <h1>Entrenamiento y = 2x + 6</h1>
    
    <div id="mensaje">Entrenando...</div>
    
    <p>Introduce X: <input type="number" id="valorX"></p>
    <button onclick="predecir()">Calcular</button>
    
    <h3>Resultado: <span id="output_field"></span></h3>

    <script>
        let model;

        async function entrenar() {
            model = tf.sequential();
            model.add(tf.layers.dense({ units: 1, inputShape: [1] }));
            
            model.compile({ loss: 'meanSquaredError', optimizer: 'sgd' });

            // 9 valores empezando en -6 
            const xs = tf.tensor2d([-6, -5, -4, -3, -2, -1, 0, 1, 2], [9, 1]);
            const ys = tf.tensor2d([-6, -4, -2, 0, 2, 4, 6, 8, 10], [9, 1]);

            await model.fit(xs, ys, { epochs: 350 });

            // Aviso de que terminó 
            document.getElementById("mensaje").innerText = "Modelo listo para usarse";
            document.getElementById("mensaje").style.color = "green";
        }

        function predecir() {
            const x = parseFloat(document.getElementById("valorX").value);
            
            // Predicción simple
            const salida = model.predict(tf.tensor2d([x], [1, 1]));
            
            // Se usa toString() 
            document.getElementById("output_field").innerText = salida.toString();
        }

        entrenar();
    </script>
  </body>
</html>
